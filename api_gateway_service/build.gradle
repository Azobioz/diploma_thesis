plugins {
    id 'java'
}

group = 'com.azobioz.apigateway'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.cloud:spring-cloud-gateway-server:4.3.2'
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway-server-webflux:4.3.2'
    implementation 'org.springframework.kafka:spring-kafka:4.0.0'
}

test {
    useJUnitPlatform()
}